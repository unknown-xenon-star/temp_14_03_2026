<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OWASP // System Boot</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Fira+Code:wght@300;400;500&display=swap');

    :root {
      --red: #c40003;
      --red-dim: rgba(196, 0, 3, 0.45);
      --red-glow: rgba(196, 0, 3, 0.12);
      --green: #00ff41;
      --green-dim: rgba(0, 255, 65, 0.55);
      --amber: #ffb800;
      --cyan: #00e5ff;
      --bg: #030303;
      --text: rgba(255, 255, 255, 0.82);
      --mono: 'Share Tech Mono', 'Fira Code', 'Courier New', monospace;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
    }

    body {
      background:
        radial-gradient(circle at center, var(--red-glow), transparent 24%),
        linear-gradient(180deg, #090909 0%, var(--bg) 100%);
      transition: opacity 0.5s ease;
    }

    body.leaving {
      opacity: 0;
    }



    /* ── CRT Scanline Overlay ── */
    .scanlines {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 100;
      background: repeating-linear-gradient(0deg,
          transparent,
          transparent 2px,
          rgba(0, 0, 0, 0.06) 2px,
          rgba(0, 0, 0, 0.06) 4px);
    }

    /* ── Vignette ── */
    .vignette {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 99;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(0, 0, 0, 0.65) 100%);
    }

    /* ── HUD Overlay ── */
    .hud-overlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      font-family: var(--mono);
    }

    /* ── ASCII Art Block ── */
    .ascii-art {
      color: var(--red);
      font-size: clamp(5px, 1.05vw, 14px);
      line-height: 1.15;
      white-space: pre;
      text-align: center;
      text-shadow:
        0 0 8px var(--red-dim),
        0 0 30px var(--red-glow);
      animation: asciiPulse 4s ease-in-out infinite;
      opacity: 0;
      transform: translateY(-10px);
      transition: opacity 0.8s cubic-bezier(0.22, 1, 0.36, 1), transform 0.8s cubic-bezier(0.22, 1, 0.36, 1);
      user-select: none;
      will-change: opacity, transform;
    }

    .ascii-art.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── Subtitle Under Logo ── */
    .ascii-subtitle {
      margin-top: 12px;
      color: var(--amber);
      font-size: 10px;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      text-shadow: 0 0 12px rgba(255, 184, 0, 0.3);
      opacity: 0;
      transition: opacity 1s cubic-bezier(0.22, 1, 0.36, 1) 0.4s;
    }

    .ascii-subtitle.visible {
      opacity: 0.85;
    }

    /* ── Terminal Console ── */
    .terminal {
      position: fixed;
      bottom: 48px;
      left: 50%;
      transform: translateX(-50%);
      width: min(600px, 90vw);
      z-index: 60;
      font-family: var(--mono);
      pointer-events: none;
    }

    .terminal-lines {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .term-line {
      font-size: 11px;
      color: var(--text);
      opacity: 0;
      transform: translateY(6px) translateZ(0);
      transition: opacity 0.35s cubic-bezier(0.22, 1, 0.36, 1), transform 0.35s cubic-bezier(0.22, 1, 0.36, 1);
      will-change: opacity, transform;
      white-space: nowrap;
      overflow: hidden;
    }

    .term-line.visible {
      opacity: 1;
      transform: translateY(0) translateZ(0);
    }

    .term-line .prompt {
      color: var(--green);
    }

    .term-line .path {
      color: var(--cyan);
    }

    .term-line .ok {
      color: var(--green-dim);
    }

    .term-line .warn {
      color: var(--amber);
    }

    .term-line .fail {
      color: var(--red);
    }

    .term-line .dim {
      color: rgba(255, 255, 255, 0.35);
    }

    /* ── Progress Bar ── */
    .progress-wrap {
      position: fixed;
      bottom: 26px;
      left: 50%;
      transform: translateX(-50%);
      width: min(400px, 70vw);
      z-index: 60;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.6s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .progress-wrap.visible {
      opacity: 1;
    }

    .progress-bar {
      height: 2px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 1px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--red), var(--amber));
      box-shadow: 0 0 10px var(--red-dim);
      transition: width 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .progress-label {
      margin-top: 6px;
      text-align: center;
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.3em;
      color: rgba(255, 255, 255, 0.35);
      text-transform: uppercase;
    }

    /* ── Corner HUD Elements ── */
    .corner-hud {
      position: fixed;
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.15em;
      color: rgba(255, 255, 255, 0.2);
      z-index: 60;
      pointer-events: none;
    }

    .corner-tl {
      top: 16px;
      left: 20px;
    }

    .corner-tr {
      top: 16px;
      right: 20px;
      text-align: right;
    }

    .corner-bl {
      bottom: 10px;
      left: 20px;
    }

    .corner-br {
      bottom: 10px;
      right: 20px;
      text-align: right;
    }

    /* ── Decorative Frame ── */
    .frame-border {
      position: fixed;
      z-index: 55;
      pointer-events: none;
    }

    .frame-top,
    .frame-bottom {
      left: 20px;
      right: 20px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--red-dim), transparent);
    }

    .frame-top {
      top: 36px;
    }

    .frame-bottom {
      bottom: 36px;
    }

    .frame-left,
    .frame-right {
      top: 36px;
      bottom: 36px;
      width: 1px;
      background: linear-gradient(180deg, transparent, var(--red-dim), transparent);
    }

    .frame-left {
      left: 20px;
    }

    .frame-right {
      right: 20px;
    }

    /* ── Keyframes ── */
    @keyframes asciiPulse {

      0%,
      100% {
        text-shadow: 0 0 8px var(--red-dim), 0 0 30px var(--red-glow);
      }

      50% {
        text-shadow: 0 0 16px var(--red-dim), 0 0 50px var(--red-glow), 0 0 80px rgba(196, 0, 3, 0.06);
      }
    }

    @keyframes blink {

      0%,
      49% {
        opacity: 1;
      }

      50%,
      100% {
        opacity: 0;
      }
    }

    .cursor-blink::after {
      content: '█';
      animation: blink 0.7s step-end infinite;
      color: var(--green);
    }
  </style>

</head>

<body>

  <!-- CRT Effects -->
  <div class="scanlines"></div>
  <div class="vignette"></div>

  <!-- Decorative Frame -->
  <div class="frame-border frame-top"></div>
  <div class="frame-border frame-bottom"></div>
  <div class="frame-border frame-left"></div>
  <div class="frame-border frame-right"></div>

  <!-- Corner HUD -->
  <div class="corner-hud corner-tl" id="hud-tl">SYS://OWASP.BOOT</div>
  <div class="corner-hud corner-tr" id="hud-tr">v3.14.03</div>
  <div class="corner-hud corner-bl" id="hud-bl"></div>
  <div class="corner-hud corner-br" id="hud-br">SEC_LEVEL: ████</div>

  <!-- Main HUD Overlay -->
  <div class="hud-overlay">
    <pre class="ascii-art" id="ascii-logo"></pre>
    <div class="ascii-subtitle" id="ascii-sub">Web Application Security // sudo_kill</div>
  </div>

  <!-- Terminal Console -->
  <div class="terminal" id="terminal">
    <div class="terminal-lines" id="term-lines"></div>
  </div>

  <!-- Progress Bar -->
  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <div class="progress-label" id="progress-label">Initializing ∙ 0%</div>
  </div>

  <script>
    /* ═══════════════════════════════════════════════
       ASCII ART + TERMINAL BOOT SEQUENCE
    ═══════════════════════════════════════════════ */

    const ASCII_LOGO = `
 ▒█████   █     █░ ▄▄▄        ██████  ██▓███  
▒██▒  ██▒▓█░ █ ░█░▒████▄    ▒██    ▒ ▓██░  ██▒
▒██░  ██▒▒█░ █ ░█ ▒██  ▀█▄  ░ ▓██▄   ▓██░ ██▓▒
▒██   ██░░█░ █ ░█ ░██▄▄▄▄██   ▒   ██▒▒██▄█▓▒ ▒
░ ████▓▒░░░██▒██▓  ▓█   ▓██▒▒██████▒▒▒██▒ ░  ░
░ ▒░▒░▒░ ░ ▓░▒ ▒   ▒▒   ▓▒█░▒ ▒▓▒ ▒ ░▓██░   ░
  ░ ▒ ▒░   ▒ ░ ░    ▒   ▒▒ ░░ ░▒  ░ ░░ ▒░   ░
░ ░ ░ ▒    ░   ░    ░   ▒   ░  ░  ░  ░ ░    ░ 
    ░ ░      ░          ░  ░      ░      ░   ░  
`.trim();

    const BOOT_LINES = [
      { text: '<span class="prompt">root@owasp</span>:<span class="path">~/sys</span>$ ./boot --secure --verbose', delay: 200 },
      { text: '<span class="dim">[    0.001]</span> Kernel security modules loaded', delay: 300 },
      { text: '<span class="dim">[    0.014]</span> Mounting encrypted filesystem... <span class="ok">[OK]</span>', delay: 250 },
      { text: '<span class="dim">[    0.031]</span> TLS 1.3 handshake ∙∙∙∙∙∙∙∙∙∙∙∙∙∙ <span class="ok">VERIFIED</span>', delay: 280 },
      { text: '<span class="dim">[    0.048]</span> Loading threat intelligence db... <span class="ok">[OK]</span>', delay: 200 },
      { text: '<span class="dim">[    0.062]</span> WAF rules injected ∙∙∙∙∙∙∙∙∙∙∙∙∙ <span class="warn">2,847 rules</span>', delay: 260 },
      { text: '<span class="dim">[    0.079]</span> Vulnerability scanner ready ∙∙∙∙∙ <span class="ok">[ARMED]</span>', delay: 220 },
      { text: '<span class="dim">[    0.093]</span> Initializing neural interface... <span class="ok">[READY]</span>', delay: 300 },
      { text: '<span class="prompt">root@owasp</span>:<span class="path">~/sys</span>$ <span class="cursor-blink"></span>', delay: 400 },
    ];

    // ── Boot sequence controller ──
    const asciiEl = document.getElementById('ascii-logo');
    const asciiSub = document.getElementById('ascii-sub');
    const termLines = document.getElementById('term-lines');
    const progressWrap = document.getElementById('progress-wrap');
    const progressFill = document.getElementById('progress-fill');
    const progressLabel = document.getElementById('progress-label');
    const hudBL = document.getElementById('hud-bl');

    let bootStart = performance.now();

    // Reveal ASCII art
    setTimeout(() => {
      asciiEl.textContent = ASCII_LOGO;
      asciiEl.classList.add('visible');
    }, 150);

    setTimeout(() => asciiSub.classList.add('visible'), 600);
    setTimeout(() => progressWrap.classList.add('visible'), 500);

    // Type boot lines
    let lineDelay = 700;
    BOOT_LINES.forEach((entry, i) => {
      setTimeout(() => {
        const div = document.createElement('div');
        div.className = 'term-line';
        div.innerHTML = entry.text;
        termLines.appendChild(div);

        // Remove cursor from previous line
        const prev = termLines.querySelectorAll('.cursor-blink');
        if (prev.length > 1) prev[0].classList.remove('cursor-blink');

        requestAnimationFrame(() => div.classList.add('visible'));

        // Update progress
        const pct = Math.min(100, Math.round(((i + 1) / BOOT_LINES.length) * 100));
        progressFill.style.width = pct + '%';
        progressLabel.textContent = `Initializing ∙ ${pct}%`;
      }, lineDelay);
      lineDelay += entry.delay;
    });

    // Update bottom-left HUD with uptime
    setInterval(() => {
      const up = ((performance.now() - bootStart) / 1000).toFixed(1);
      hudBL.textContent = `UPTIME: ${up}s`;
    }, 100);

    // Fade out and redirect
    setTimeout(() => {
      document.body.classList.add('leaving');
    }, 3600);

    setTimeout(() => {
      window.location.href = '3d_loading.html';
    }, 4300);
  </script>
</body>

</html>
